apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: hpa-status
spec:
  version: {{ .TagName }}
  homepage: https://github.com/mattsu2020/kubectl-hpa-status
  shortDescription: Show detailed HPA status, scaling analysis, and safe fix suggestions
  description: |
    Displays detailed HorizontalPodAutoscaler status including current and
    target utilization, replica counts, scaling conditions, metric analysis,
    and interpretation of scaling decisions. Features include health scoring,
    KEDA ScaledObject cross-reference, VPA conflict detection, metrics pipeline
    diagnostics, resource request consistency checks, safe dry-run-first patch
    suggestions, interactive TUI dashboard, stabilization window countdown,
    standalone reports, shell completion, and Japanese language support.
    This plugin reads existing HPA status, metrics, conditions, and events
    to provide human-readable analysis without reimplementing the HPA
    controller's internal decision logic.
  caveats: |
    Krew installs the plugin as hpa-status. kubectl discovers that as
    kubectl hpa_status. This project also documents kubectl hpa status for
    nested plugin usage where kubectl plugin discovery supports it.


  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/mattsu2020/kubectl-hpa-status/releases/download/{{ .TagName }}/kubectl-hpa-status_{{ .TagName }}_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-hpa-status
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/mattsu2020/kubectl-hpa-status/releases/download/{{ .TagName }}/kubectl-hpa-status_{{ .TagName }}_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-hpa-status
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/mattsu2020/kubectl-hpa-status/releases/download/{{ .TagName }}/kubectl-hpa-status_{{ .TagName }}_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-hpa-status
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/mattsu2020/kubectl-hpa-status/releases/download/{{ .TagName }}/kubectl-hpa-status_{{ .TagName }}_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-hpa-status
  - selector:
      matchLabels:
        os: windows
        arch: amd64
    {{addURIAndSha "https://github.com/mattsu2020/kubectl-hpa-status/releases/download/{{ .TagName }}/kubectl-hpa-status_{{ .TagName }}_windows_amd64.tar.gz" .TagName }}
    bin: kubectl-hpa-status.exe
