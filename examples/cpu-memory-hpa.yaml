apiVersion: v1
kind: Namespace
metadata:
  name: hpa-status-examples
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-multi
  namespace: hpa-status-examples
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-multi
  template:
    metadata:
      labels:
        app: web-multi
    spec:
      containers:
        - name: web
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-multi
  namespace: hpa-status-examples
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-multi
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

