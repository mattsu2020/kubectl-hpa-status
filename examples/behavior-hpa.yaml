apiVersion: v1
kind: Namespace
metadata:
  name: hpa-status-examples
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-behavior
  namespace: hpa-status-examples
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-behavior
  template:
    metadata:
      labels:
        app: web-behavior
    spec:
      containers:
        - name: web
          image: registry.k8s.io/hpa-example
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-behavior
  namespace: hpa-status-examples
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-behavior
  minReplicas: 2
  maxReplicas: 20
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

