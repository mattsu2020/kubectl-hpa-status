<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="multi metric output">
  <rect width="960" height="420" rx="12" fill="#111827"/>
  <text x="28" y="46" fill="#93c5fd" font-family="ui-monospace,Menlo,monospace" font-size="18">$ kubectl hpa status web-multi --explain</text>
  <text x="28" y="100" fill="#e2e8f0" font-family="ui-monospace,Menlo,monospace" font-size="17">Metrics:</text>
  <text x="52" y="142" fill="#e2e8f0" font-family="ui-monospace,Menlo,monospace" font-size="16">- Resource cpu current=70% target=80% ratio=0.875</text>
  <text x="52" y="182" fill="#facc15" font-family="ui-monospace,Menlo,monospace" font-size="16">- Resource memory current=68% target=50% ratio=1.360</text>
  <text x="28" y="244" fill="#facc15" font-family="ui-monospace,Menlo,monospace" font-size="16">Impact estimate: memory has the largest visible distance from target.</text>
  <text x="28" y="304" fill="#cbd5e1" font-family="ui-monospace,Menlo,monospace" font-size="16">Caveat: Kubernetes does not expose the exact per-metric winner.</text>
</svg>
