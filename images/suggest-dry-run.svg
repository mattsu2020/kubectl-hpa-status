<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="suggest dry-run command output">
  <rect width="960" height="420" rx="12" fill="#111827"/>
  <text x="28" y="46" fill="#93c5fd" font-family="ui-monospace,Menlo,monospace" font-size="18">$ kubectl hpa status api --suggest</text>
  <text x="28" y="98" fill="#facc15" font-family="ui-monospace,Menlo,monospace" font-size="17">Recommended commands:</text>
  <text x="52" y="140" fill="#e2e8f0" font-family="ui-monospace,Menlo,monospace" font-size="16">- Raise maxReplicas: capped at maxReplicas=10; proposed maxReplicas=20</text>
  <text x="52" y="186" fill="#86efac" font-family="ui-monospace,Menlo,monospace" font-size="15">$ kubectl patch hpa api -n default --type=merge -p '{"spec":{"maxReplicas":20}}' --dry-run=server</text>
  <text x="52" y="242" fill="#cbd5e1" font-family="ui-monospace,Menlo,monospace" font-size="15">precondition: ScalingActive is True.</text>
  <text x="52" y="278" fill="#fca5a5" font-family="ui-monospace,Menlo,monospace" font-size="15">warning: Confirm node capacity, quotas, and downstream limits before persisting.</text>
</svg>
