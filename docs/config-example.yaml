# Example ~/.kube/hpa-status.yaml
# All fields are optional. Explicit flags always win over config values.
# Place this file at ~/.kube/hpa-status.yaml or specify with --config.

# Default namespace (equivalent to -n)
# namespace: production

# List across all namespaces (equivalent to -A)
# allNamespaces: true

# Default output format: table, wide, json, yaml
# output: json

# Show extra columns in list output
# wide: true

# Label selector for list/scan
# selector: app.kubernetes.io/part-of=my-service

# Sort list output: namespace, name, current, desired, diff, healthscore, issue, problem
# sortBy: problem

# Filter list output: all, ok, error, limited, scaling-limited, issue
# filter: issue

# Score range filtering (show only HPAs in this range)
# minScore: 60
# maxScore: 90

# Color output: auto, always, never
color: auto

# Number of recent events to show
events: 5

# Disable events entirely
# eventsEnabled: false

# Text language: en or ja
# lang: ja

# Include debug details
# debug: true

# Dashboard mode for watch
# dashboard: true

# Kubernetes list API page size for list/scan/tui. Set to 0 to disable pagination.
# Default: 500. For very large clusters (10,000+ HPAs), consider 1000 to reduce API round-trips.
# chunkSize: 500

# Named output templates. Use with -o hpa-names, -o jsonpath:summary,
# or -o template:hpa-names.
# templates:
#   hpa-names:
#     type: go-template
#     template: '{{ range .Items }}{{ .Namespace }}/{{ .Name }}{{ "\n" }}{{ end }}'
#   summary:
#     type: jsonpath
#     template: '{.analysis.summary}'

# Custom health score penalty weights.
# Each weight is a penalty deducted from the starting score of 100 when the
# corresponding condition is detected. A higher value means a harsher penalty.
#
# Override via CLI flag (repeatable):
#   --health-weight scalingInactive=50 --health-weight scalingLimited=30
#
# Available weights and their defaults:
healthWeights:
  scalingInactive: 45    # Deducted when ScalingActive != True (metrics unavailable). Default: 45
  unableToScale: 35      # Deducted when AbleToScale != True (controller issue). Default: 35
  scalingLimited: 25     # Deducted when ScalingLimited == True (hit min/max bounds). Default: 25
  implicitMaxReplicas: 20 # Deducted when current == desired == maxReplicas. Default: 20
  scaleDownStabilized: 10 # Deducted during scale-down stabilization window. Default: 10
  atMinimumReplicas: 5    # Deducted when desired == minReplicas. Default: 5
