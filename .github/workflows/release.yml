name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  # id-token: write is required for cosign keyless signing (OIDC) and for the
  # SLSA provenance generator to attest the build.
  id-token: write
  # attestions: write lets the SLSA generator attach provenance to the release.
  attestations: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      # Install cosign for keyless sigstore signing of release artifacts.
      # COSIGN_EXPERIMENTAL=1 enables keyless (certificate-based) signing that
      # does not require a persisted private key.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      # GoReleaser delegates archive SBOM generation to Syft. Install a pinned,
      # immutable Syft release explicitly so a tag build cannot silently lose
      # the SBOM artifacts declared in .goreleaser.yml.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.44.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.16.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: '1'

      # Generate SLSA Build Level 3 provenance attestation for the release
      # artifacts so downstream users can verify the build origin.
      - name: Generate artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

      - name: Update krew-index
        uses: rajatjindal/krew-release-bot@v0.0.51
