name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -v ./...

      - name: Race detector
        # Run the race detector on the pure-logic packages where concurrency
        # matters most (pkg/hpa atomic clock, cmd concurrent report building).
        run: go test -race ./pkg/... ./cmd/... ./internal/...

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          echo "## Coverage summary"
          go tool cover -func=coverage.out | grep total | awk '{print "Total coverage: "$3}'

      - name: Check coverage threshold
        run: |
          # Tiered regression gates: the core analysis package (pkg/hpa) is held
          # to a higher bar than cmd/ (which has thinner integration coverage).
          # Raise these as coverage improves.
          func_avg() { go tool cover -func=coverage.out | awk -v p="$1" '$0 ~ p {gsub("%","",$3); s+=$3; n++} END {if(n>0) printf "%.1f", s/n; else print 0}'; }
          check() {
            name="$1"; val="$2"; threshold="$3"
            echo "$name coverage: ${val}% (threshold ${threshold}%)"
            if [ "$(echo "$val < $threshold" | bc -l)" = "1" ]; then
              echo "::error::$name coverage ${val}% is below ${threshold}%"
              exit 1
            fi
          }
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          check "Total" "$TOTAL" 50
          check "pkg/hpa" "$(func_avg '/pkg/hpa/')" 60
          check "cmd" "$(func_avg '/cmd/')" 45

      - name: Check README sync
        run: bash scripts/check-readme-sync.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: gosec
        uses: securego/gosec@v2.27.1
        with:
          # -exclude disables rules that are intentional for this codebase:
          #   G115 (int->int32 overflow) — every site assigns replica counts
          #     into Kubernetes API *int32 fields (Spec.MaxReplicas etc.),
          #     bounded to realistic ranges, never untrusted input.
          #   G304 (file inclusion via variable) — this is a kubectl plugin;
          #     every os.Open is on a user-supplied CLI path (--manifest,
          #     --timeline-file, --config, history store paths) by design.
          #   G602 (slice index out of range) — false positives on bounded
          #     loops (e.g. i += 2 pairs).
          #   G301/G302/G306 (file perms) — 0644/0755 are intentional for
          #     user-readable output/history files.
          args: -exclude G115,G304,G602,G301,G302,G306 ./...

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kubernetes:
          - "1.26"
          - "1.28"
          - "1.30"
          - "1.35"
        include:
          - kubernetes: "1.26"
            kind-node-image: kindest/node:v1.26.15
          - kubernetes: "1.28"
            kind-node-image: kindest/node:v1.28.15
          - kubernetes: "1.30"
            kind-node-image: kindest/node:v1.30.13
          - kubernetes: "1.35"
            kind-node-image: kindest/node:v1.35.0
          # NOTE: Kubernetes 1.36 is intentionally omitted. As of 2026-06-16
          # kindest/node:v1.36.0 has not been published to Docker Hub yet
          # (kind's node images lag the upstream release). Re-add the 1.36
          # matrix entry once the image is available.
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
          node_image: ${{ matrix.kind-node-image }}

      - name: Install metrics-server
        # metrics-server is required by the "real HPA behavior" E2E tests
        # (scenario #1: CPU load driving the HPA to maxReplicas, and #2:
        # metrics.k8s.io API detection). Without it those tests skip. The
        # --kubelet-insecure-tls flag is needed because kind nodes serve a
        # self-signed kubelet serving certificate.
        #
        # The version is pinned (instead of releases/latest) for CI
        # reproducibility: a surprise upstream release should not flip E2E
        # behavior on an unrelated PR. Bump deliberately when updating.
        env:
          METRICS_SERVER_VERSION: v0.7.0
        run: |
          kubectl apply -f "https://github.com/kubernetes-sigs/metrics-server/releases/download/${METRICS_SERVER_VERSION}/components.yaml"
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl wait --for=condition=available deployment/metrics-server -n kube-system --timeout=120s

      - name: Install KEDA and VPA CRDs
        # Install the optional CRDs so the CRD-present E2E branches (VPA
        # conflict #6, KEDA ScaledObject lookup #5) actually exercise the
        # enrichment paths instead of skipping.
        #
        # Versions are pinned for reproducibility and so a CRD fetch failure
        # is distinguishable from a test failure: the download is captured in
        # its own step output rather than swallowed by `|| echo`, and each
        # apply failure is logged with the offending URL before the step
        # continues (CRD-present tests skip cleanly when a CRD is absent).
        env:
          KEDA_VERSION: v2.20.1
          VPA_VERSION: vertical-pod-autoscaler-1.3.1
        run: |
          set +e
          keda_url="https://github.com/kedacore/keda/releases/download/${KEDA_VERSION}/keda-${KEDA_VERSION#v}-crds.yaml"
          vpa_url="https://github.com/kubernetes/autoscaler/releases/download/${VPA_VERSION}/vpa-crds.yaml"

          echo "Fetching KEDA CRDs: ${keda_url}"
          if ! kubectl apply --server-side -f "${keda_url}"; then
            echo "::warning::KEDA CRD install failed (${keda_url}); CRD-present E2E tests will skip"
          fi

          echo "Fetching VPA CRDs: ${vpa_url}"
          if ! kubectl apply --server-side -f "${vpa_url}"; then
            echo "::warning::VPA CRD install failed (${vpa_url}); CRD-present E2E tests will skip"
          fi

      - name: Run E2E Tests
        run: |
          kubectl cluster-info
          go test -v -tags=e2e ./test/e2e/...
