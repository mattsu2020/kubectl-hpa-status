name: ci

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref so a rapid succession of pushes
# (common during PR iteration) does not queue multiple expensive e2e matrices.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      # Cross-platform matrix: the plugin is cross-compiled for linux/darwin/
      # windows on amd64/arm64, but unit tests previously only ran on Linux.
      # macOS coverage catches filesystem and path-handling regressions
      # (history store, kubeconfig resolution) that Linux does not surface.
      # Windows is excluded for now because the TUI and shell-completion paths
      # depend on Unix-only behavior; adding it is tracked in ROADMAP.md.
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check go.mod/go.sum tidy
        # Fails if go.mod or go.sum are out of sync with the imports actually
        # used, preventing an un-tidy module from merging. Mirrors the local
        # `make tidy` gate so contributors hit this before pushing.
        # Run on Linux only; module state is OS-independent and macOS minutes
        # are billed at a higher rate on private repos.
        if: matrix.os == 'ubuntu-latest'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check gofmt
        # Reject un-gofmt'd Go so the lint job does not have to surface basic
        # formatting errors. Mirrors the local `make fmt-check` target.
        if: matrix.os == 'ubuntu-latest'
        run: |
          out=$(gofmt -l cmd/ pkg/ internal/)
          if [ -n "$out" ]; then
            echo "::error::gofmt would modify the following files; run 'gofmt -w' and commit:"
            echo "$out"
            exit 1
          fi

      - name: Test
        run: go test -v ./...

      - name: Race detector
        # Run the race detector on the pure-logic packages where concurrency
        # matters most (pkg/hpa atomic clock, cmd concurrent report building).
        # Linux-only: macOS/Windows runners are slower and the race detector
        # behavior we care about is OS-independent.
        if: matrix.os == 'ubuntu-latest'
        run: go test -race ./pkg/... ./cmd/... ./internal/...

      - name: Coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          echo "## Coverage summary"
          go tool cover -func=coverage.out | grep total | awk '{print "Total coverage: "$3}'

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Tiered regression gates: the core analysis package (pkg/hpa) is held
          # to a higher bar than cmd/ (which has thinner integration coverage).
          # Raise these as coverage improves.
          func_avg() { go tool cover -func=coverage.out | awk -v p="$1" '$0 ~ p {gsub("%","",$3); s+=$3; n++} END {if(n>0) printf "%.1f", s/n; else print 0}'; }
          check() {
            name="$1"; val="$2"; threshold="$3"
            echo "$name coverage: ${val}% (threshold ${threshold}%)"
            if [ "$(echo "$val < $threshold" | bc -l)" = "1" ]; then
              echo "::error::$name coverage ${val}% is below ${threshold}%"
              exit 1
            fi
          }
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          check "Total" "$TOTAL" 65
          check "pkg/hpa" "$(func_avg '/pkg/hpa/')" 70
          check "cmd" "$(func_avg '/cmd/')" 60

      - name: Check README sync
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-readme-sync.sh

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: govulncheck
        if: matrix.os == 'ubuntu-latest'
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: gosec
        if: matrix.os == 'ubuntu-latest'
        uses: securego/gosec@v2.27.1
        with:
          # -exclude disables rules that are intentional for this codebase:
          #   G115 (int->int32 overflow) — every site assigns replica counts
          #     into Kubernetes API *int32 fields (Spec.MaxReplicas etc.),
          #     bounded to realistic ranges, never untrusted input.
          #   G304 (file inclusion via variable) — this is a kubectl plugin;
          #     every os.Open is on a user-supplied CLI path (--manifest,
          #     --timeline-file, --config, history store paths) by design.
          #   G602 (slice index out of range) — false positives on bounded
          #     loops (e.g. i += 2 pairs).
          #   G301/G302/G306 (file perms) — 0644/0755 are intentional for
          #     user-readable output/history files.
          args: -exclude G115,G304,G602,G301,G302,G306 ./...

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  # Security scanning with SARIF upload to the GitHub Security tab.
  # Runs gosec with SARIF output and uploads alongside CodeQL findings so all
  # security alerts are visible in one place. Mirrors the gosec exclusions used
  # in the build job (G115/G304/G602/G301/G302/G306).
  code-scanning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run gosec (SARIF)
        uses: securego/gosec@v2.27.1
        with:
          # Same exclusions as the build-job gosec step; emit SARIF for upload.
          args: -exclude G115,G304,G602,G301,G302,G306 -fmt sarif -out gosec-results.sarif ./...

      - name: Upload gosec SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  # Forward-compatibility gate: build and test against the next Go release in
  # addition to the version pinned in go.mod. Catches upstream API removals and
  # stdlib behavior changes before they land in the supported toolchain. Allowed
  # to fail (continue-on-error) so a beta-toolchain hiccup does not block a PR,
  # but surfaces regressions on the dashboard.
  forward-compat:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.27', 'rc']
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          # Do not use the cache keyed on go.mod; this job intentionally uses
          # a different toolchain.
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kubernetes:
          - "1.26"
          - "1.28"
          - "1.30"
          - "1.35"
        include:
          - kubernetes: "1.26"
            kind-node-image: kindest/node:v1.26.15
          - kubernetes: "1.28"
            kind-node-image: kindest/node:v1.28.15
          - kubernetes: "1.30"
            kind-node-image: kindest/node:v1.30.13
          - kubernetes: "1.35"
            kind-node-image: kindest/node:v1.35.0
          # NOTE: Kubernetes 1.36 is intentionally omitted. As of 2026-06-16
          # kindest/node:v1.36.0 has not been published to Docker Hub yet
          # (kind's node images lag the upstream release). Re-add the 1.36
          # matrix entry once the image is available.
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
          node_image: ${{ matrix.kind-node-image }}

      - name: Install metrics-server
        # metrics-server is required by the "real HPA behavior" E2E tests
        # (scenario #1: CPU load driving the HPA to maxReplicas, and #2:
        # metrics.k8s.io API detection). Without it those tests skip. The
        # --kubelet-insecure-tls flag is needed because kind nodes serve a
        # self-signed kubelet serving certificate.
        #
        # The version is pinned (instead of releases/latest) for CI
        # reproducibility: a surprise upstream release should not flip E2E
        # behavior on an unrelated PR. Bump deliberately when updating.
        env:
          METRICS_SERVER_VERSION: v0.7.0
        run: |
          kubectl apply -f "https://github.com/kubernetes-sigs/metrics-server/releases/download/${METRICS_SERVER_VERSION}/components.yaml"
          kubectl patch deployment metrics-server -n kube-system --type='json' \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          kubectl wait --for=condition=available deployment/metrics-server -n kube-system --timeout=120s

      - name: Install KEDA and VPA CRDs
        # Install the optional CRDs so the CRD-present E2E branches (VPA
        # conflict #6, KEDA ScaledObject lookup #5) actually exercise the
        # enrichment paths instead of skipping.
        #
        # Versions are pinned for reproducibility and so a CRD fetch failure
        # is distinguishable from a test failure: the download is captured in
        # its own step output rather than swallowed by `|| echo`, and each
        # apply failure is logged with the offending URL before the step
        # continues (CRD-present tests skip cleanly when a CRD is absent).
        env:
          KEDA_VERSION: v2.20.1
          VPA_VERSION: vertical-pod-autoscaler-1.3.1
        run: |
          set +e
          keda_url="https://github.com/kedacore/keda/releases/download/${KEDA_VERSION}/keda-${KEDA_VERSION#v}-crds.yaml"
          vpa_url="https://github.com/kubernetes/autoscaler/releases/download/${VPA_VERSION}/vpa-crds.yaml"

          echo "Fetching KEDA CRDs: ${keda_url}"
          if ! kubectl apply --server-side -f "${keda_url}"; then
            echo "::warning::KEDA CRD install failed (${keda_url}); CRD-present E2E tests will skip"
          fi

          echo "Fetching VPA CRDs: ${vpa_url}"
          if ! kubectl apply --server-side -f "${vpa_url}"; then
            echo "::warning::VPA CRD install failed (${vpa_url}); CRD-present E2E tests will skip"
          fi

      - name: Run E2E Tests
        run: |
          kubectl cluster-info
          go test -v -tags=e2e ./test/e2e/...
