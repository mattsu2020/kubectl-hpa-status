name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -v ./...

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          echo "## Coverage summary"
          go tool cover -func=coverage.out | grep total | awk '{print "Total coverage: "$3}'

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${TOTAL}%"
          # Regression-prevention gate. Raise toward 70%/80% as coverage improves.
          THRESHOLD=50
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc -l)" = "1" ]; then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Check README sync
        run: bash scripts/check-readme-sync.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

      - name: gosec
        uses: securego/gosec@v2.27.1
        with:
          args: ./...

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kubernetes:
          - "1.26"
          - "1.28"
          - "1.30"
          - "1.35"
          - "1.36"
        include:
          - kubernetes: "1.26"
            kind-node-image: kindest/node:v1.26.15
          - kubernetes: "1.28"
            kind-node-image: kindest/node:v1.28.15
          - kubernetes: "1.30"
            kind-node-image: kindest/node:v1.30.13
          - kubernetes: "1.35"
            kind-node-image: kindest/node:v1.35.0
          - kubernetes: "1.36"
            kind-node-image: kindest/node:v1.36.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create kind cluster
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kind
          node_image: ${{ matrix.kind-node-image }}

      - name: Run E2E Tests
        run: |
          kubectl cluster-info
          go test -v -tags=e2e ./test/e2e/...
