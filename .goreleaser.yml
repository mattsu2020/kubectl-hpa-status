version: 2

project_name: kubectl-hpa-status

before:
  hooks:
    - go mod tidy

builds:
  - id: kubectl-hpa-status
    main: .
    binary: kubectl-hpa-status
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mattsu2020/kubectl-hpa-status/cmd.version={{ .Tag }} -X github.com/mattsu2020/kubectl-hpa-status/cmd.commit={{ .Commit }} -X github.com/mattsu2020/kubectl-hpa-status/cmd.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

brews:
  - name: kubectl-hpa-status
    repository:
      owner: mattsu2020
      name: homebrew-kubectl-hpa-status
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/mattsu2020/kubectl-hpa-status
    description: kubectl plugin for HPA status, scaling analysis, and suggested fixes
    license: Apache-2.0
    install: |
      bin.install "kubectl-hpa-status"
    test: |
      system "#{bin}/kubectl-hpa-status", "version"
    caveats: |
      Try:
        kubectl-hpa-status list -A --wide
        kubectl-hpa-status status <hpa-name> --suggest

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
