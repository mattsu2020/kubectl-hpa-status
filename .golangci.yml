version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    staticcheck:
      checks:
        - all
        - -QF1012 # WriteString(Sprintf) is acceptable for readability

issues:
  exclude-rules:
    # Deprecated fake.NewSimpleClientset has no direct replacement without applyconfig
    - path: internal/kube/testhelpers.go
      linters:
        - staticcheck
      text: "SA1019"

formatters:
  enable:
    - gofmt
    - goimports
