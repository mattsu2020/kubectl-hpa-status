version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    gocyclo:
      min-complexity: 15
    staticcheck:
      checks:
        - all
        - -QF1012 # WriteString(Sprintf) is acceptable for readability

  exclusions:
    rules:
      # Test functions are table-driven with parallel subtests/assertions; their
      # cyclomatic complexity reflects test breadth, not production code quality.
      # gocyclo is enforced on production code where complexity matters most.
      - path: _test\.go
        linters:
          - gocyclo

formatters:
  enable:
    - gofmt
    - goimports
