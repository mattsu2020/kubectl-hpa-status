version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    staticcheck:
      checks:
        - all
        - -QF1012 # WriteString(Sprintf) is acceptable for readability

formatters:
  enable:
    - gofmt
    - goimports
